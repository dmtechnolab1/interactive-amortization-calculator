<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Amortization Calculator Engine</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f7fafc; color: #2d3748; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #3182ce; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2b6cb0; }
        #result { margin-top: 20px; font-size: 1.2em; font-weight: bold; text-align: center; color: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Loan Calculator Engine</h2>
        <label>Principal Loan Amount ($)</label>
        <input type="number" id="loanAmount" value="10000">
        
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="interestRate" step="0.01" value="5">
        
        <label>Loan Term (Years)</label>
        <input type="number" id="loanTerm" value="5">
        
        <button onclick="calculateLoan()">Run Amortization Math</button>
        <div id="result"></div>
    </div>

    <script>
        function calculateLoan() {
            const principal = parseFloat(document.getElementById('loanAmount').value);
            const calculatedInterest = parseFloat(document.getElementById('interestRate').value) / 100 / 12;
            const calculatedPayments = parseFloat(document.getElementById('loanTerm').value) * 12;

            const x = Math.pow(1 + calculatedInterest, calculatedPayments);
            const monthly = (principal * x * calculatedInterest) / (x - 1);

            if (isFinite(monthly)) {
                document.getElementById('result').innerHTML = 'Estimated Monthly Payment: $' + monthly.toFixed(2);
            } else {
                document.getElementById('result').innerHTML = 'Please check your inputs.';
            }
        }
    </script>
</body>
</html>
